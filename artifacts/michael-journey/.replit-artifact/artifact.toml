kind = "web"
previewPath = "/"
title = "Michael Journey"
version = "1.0.0"
id = "artifacts/michael-journey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20690
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/michael-journey run dev"

[services.env]
PORT = "20690"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/michael-journey", "run", "build"]
publicDir = "artifacts/michael-journey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
